name: Test Pyraview

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_and_test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Configure CMake
        shell: bash
        run: |
          mkdir build
          if [ "${{ runner.os }}" == "Windows" ]; then
            cmake -S . -B build -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
          else
            cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          fi

      - name: Build All
        run: cmake --build build --parallel

      - name: Run C Tests
        shell: bash
        run: |
          cd build
          ctest --output-on-failure

  build-matlab:
    name: Build & Test Matlab (${{ matrix.os }})
    needs: build_and_test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Matlab actions support limited OS versions, check availability
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: matlab-actions/setup-matlab@v2
        with:
          release: 'R2024b'

      - name: Compile MEX
        uses: matlab-actions/run-command@v2
        with:
          # Run the updated build script which handles paths correctly
          command: cd('src/matlab'); build_pyraview;

      - name: Run Matlab Tests
        uses: matlab-actions/run-command@v2
        with:
          command: |
            addpath('src/matlab');
            addpath('src/matlab/tests');
            results = runtests('pyraview.unittest.TestDataset');
            assert(~any([results.Failed]));
